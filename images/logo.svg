<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="60" height="60">
  <!-- Cloud shadow/base -->
  <ellipse cx="250" cy="270" rx="145" ry="55" fill="#3a8a9a" opacity="0.5"/>

  <!-- Cloud main body -->
  <path d="M130,270 Q100,270 100,240 Q100,210 130,205 Q125,175 155,165 Q165,135 200,135 Q220,120 245,125 Q265,110 295,120 Q330,115 345,145 Q375,145 385,170 Q410,175 405,210 Q415,240 395,255 Q390,270 370,270 Z"
        fill="#4ab3c5" stroke="#1a1a1a" stroke-width="7" stroke-linejoin="round"/>

  <!-- Cloud darker overlay for depth -->
  <path d="M155,260 Q200,285 280,275 Q340,268 385,250 Q390,270 370,270 Q290,285 200,278 Q160,275 130,270 Z"
        fill="#3a8a9a" opacity="0.6"/>

  <!-- Cloud highlights (white gloss) -->
  <path d="M155,170 Q165,150 185,152 Q172,162 168,178 Z" fill="white" opacity="0.5"/>
  <path d="M160,178 Q168,158 188,158 Q178,172 174,185 Z" fill="white" opacity="0.3"/>
  <ellipse cx="185" cy="168" rx="22" ry="10" fill="white" opacity="0.25" transform="rotate(-30,185,168)"/>

  <!-- Smile/curve on cloud -->
  <path d="M195,225 Q225,245 265,235 Q245,255 210,248 Z" fill="#2a7a8a" opacity="0.5"/>
  <path d="M180,220 Q220,245 270,232" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>

  <!-- Circuit lines from bottom of cloud -->
  <!-- Left outer line -->
  <line x1="165" y1="268" x2="165" y2="310" stroke="#1a1a1a" stroke-width="5"/>
  <line x1="145" y1="310" x2="165" y2="310" stroke="#1a1a1a" stroke-width="5"/>
  <line x1="145" y1="310" x2="145" y2="350" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Left outer endpoint -->
  <circle cx="145" cy="368" r="14" fill="#d4a820" stroke="#1a1a1a" stroke-width="4"/>

  <!-- Left middle-outer line -->
  <line x1="200" y1="272" x2="200" y2="330" stroke="#1a1a1a" stroke-width="5"/>
  <line x1="180" y1="330" x2="200" y2="330" stroke="#1a1a1a" stroke-width="5"/>
  <line x1="180" y1="330" x2="180" y2="380" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Left middle-outer endpoint -->
  <circle cx="180" cy="398" r="14" fill="#d4a820" stroke="#1a1a1a" stroke-width="4"/>

  <!-- Center-left line -->
  <line x1="228" y1="278" x2="228" y2="345" stroke="#1a1a1a" stroke-width="5"/>
  <line x1="215" y1="345" x2="228" y2="345" stroke="#1a1a1a" stroke-width="5"/>
  <line x1="215" y1="345" x2="215" y2="395" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Center-left endpoint -->
  <circle cx="215" cy="413" r="14" fill="#d4a820" stroke="#1a1a1a" stroke-width="4"/>

  <!-- Center line straight down -->
  <line x1="252" y1="278" x2="252" y2="415" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Center endpoint -->
  <circle cx="252" cy="432" r="14" fill="#d4a820" stroke="#1a1a1a" stroke-width="4"/>

  <!-- Right middle line -->
  <line x1="295" y1="272" x2="295" y2="340" stroke="#1a1a1a" stroke-width="5"/>
  <line x1="295" y1="340" x2="315" y2="340" stroke="#1a1a1a" stroke-width="5"/>
  <line x1="315" y1="340" x2="315" y2="380" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Right middle endpoint -->
  <circle cx="315" cy="398" r="14" fill="#d4a820" stroke="#1a1a1a" stroke-width="4"/>

  <!-- Right outer line -->
  <line x1="335" y1="262" x2="335" y2="310" stroke="#1a1a1a" stroke-width="5"/>
  <line x1="335" y1="310" x2="358" y2="310" stroke="#1a1a1a" stroke-width="5"/>
  <line x1="358" y1="310" x2="358" y2="350" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Right outer endpoint -->
  <circle cx="358" cy="368" r="14" fill="#d4a820" stroke="#1a1a1a" stroke-width="4"/>
</svg>
